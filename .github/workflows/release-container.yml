jobs:
  release:
    runs-on: ubuntu-24.04-arm
    steps:
    - uses: actions/checkout@v4
      with:
        lfs: true
    - name: Validate tag (strict semver)
      run: "TAG=\"${{ github.ref_name }}\"\nif [[ ! \"$TAG\" =~ ^v[0-9]+\\.[0-9]+\\\
        .[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then\n  echo \"::error::tag '$TAG' is not a\
        \ strict semver vX.Y.Z[-prerelease] — refusing to release\" >&2\n  exit 1\n\
        fi\n"
      shell: bash
    - uses: DeterminateSystems/nix-installer-action@main
      with:
        extra-conf: lazy-trees = true
    - uses: nix-community/cache-nix-action@v7
      with:
        primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
        restore-prefixes-first-match: nix-${{ runner.os }}-
    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        password: ${{ secrets.GITHUB_TOKEN }}
        registry: ghcr.io
        username: ${{ github.actor }}
    - name: SSH auth for private flake inputs
      run: "install -d -m 700 ~/.ssh\nkey=\"${{ secrets.DEPLOY_KEY }}\"\nif [ -z \"\
        $key\" ]; then\n  echo \"::error::DEPLOY_KEY secret is unset — this build\
        \ fetches a private git+ssh flake input. Provision it with: git_ops init-deploy-key\
        \ <owner>/<private-repo>\" >&2\n  exit 1\nfi\nprintf '%s\\n' \"$key\" > ~/.ssh/id_ed25519\n\
        chmod 600 ~/.ssh/id_ed25519\nssh-keyscan -t rsa,ed25519 github.com >> ~/.ssh/known_hosts\
        \ 2>/dev/null\n"
      shell: bash
    - name: Build + push containers
      run: "set -euo pipefail\nsys=\"$(nix eval --impure --raw --expr builtins.currentSystem)\"\
        \n# Extract to a var first: `for x in $(cmd)` swallows cmd's exit code, so\
        \ a\n# failed eval (e.g. a flake error) would leave the loop empty and the\
        \ job GREEN.\nnames=\"$(nix eval --json \".#containers.$sys\" --apply builtins.attrNames\
        \ | jq -r '.[]')\"\n[ -n \"$names\" ] || { echo \"::error::no containers found\
        \ under .#containers.$sys\" >&2; exit 1; }\n# nixpkgs skopeo rejects the GH\
        \ runner's v1-format /etc/containers/registries.conf\n# (\"must be in v2 format\"\
        ); point it at our own minimal v2 file so it never reads the host's.\nexport\
        \ CONTAINERS_REGISTRIES_CONF=\"$(mktemp)\"\nprintf 'unqualified-search-registries\
        \ = []\\n' > \"$CONTAINERS_REGISTRIES_CONF\"\nfor name in $names; do\n  echo\
        \ \"::group::$name\"\n  RESULT=\"$(nix build \".#$name-container\" --no-link\
        \ --print-out-paths)\"\n  nix run nixpkgs#skopeo -- copy \\\n    \"docker-archive:$RESULT\"\
        \ \\\n    \"docker://ghcr.io/ev-invest/$name:${{ github.ref_name }}\"\n  echo\
        \ \"::endgroup::\"\ndone\n"
      shell: bash
    timeout-minutes: 40
name: Release containers
'on':
  push:
    tags:
    - v[0-9]+.*
permissions:
  contents: read
  packages: write
