<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<!-- SVG favicon (Next file convention → served at /icon.svg with sizes="any").
     The shortened EV mark (skyline only, no wordmark) on a transparent field —
     GitHub-style, no brand chip. Sourced from the Logo Figma file (node 8:16).
     It paints in limestone-mist ivory by default (dark browser chrome) and
     flips to brand navy under a light color scheme so it stays legible either
     way. The committed raster icons (apple-icon.png / public/icon-*.png) keep
     the navy field — a chip is correct for home-screen / PWA contexts. -->
<svg xmlns="http://www.w3.org/2000/svg" width="640" height="640" viewBox="0 0 640 640">
<style>
  path { fill: #e6e1d3; }
  @media (prefers-color-scheme: light) { path { fill: #001e4e; } }
</style>
